<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ziyoraco</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#fff;color:#111}
header{position:fixed;top:0;width:100%;background:#000;color:#fff;padding:15px 5%;display:flex;justify-content:space-between;align-items:center;z-index:1000}
.logo small{display:block;color:#ccc}
.cart-btn{position:relative;cursor:pointer;font-size:28px}
.badge{position:absolute;top:-8px;right:-10px;background:red;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px}
.hero{height:100vh;background:url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=1200') center/cover;display:flex;align-items:center;justify-content:center;text-align:center}
.overlay{background:rgba(0,0,0,.55);padding:40px;border-radius:12px;color:#fff}
.btn{background:#2563eb;color:#fff;padding:12px 24px;text-decoration:none;border-radius:8px;display:inline-block;margin-top:15px}
.products{padding:100px 5%}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{border:1px solid #ddd;border-radius:12px;overflow:hidden}
.card img{width:100%;height:220px;object-fit:cover}
.info{padding:15px}
.price{color:#2563eb;font-weight:bold;font-size:22px}
.qty{display:flex;gap:10px;align-items:center;margin:10px 0}
.qty button,.add{padding:8px 12px;border:none;cursor:pointer}
.add{width:100%;background:#2563eb;color:#fff;border-radius:6px}
.cart{position:fixed;top:0;right:-420px;width:400px;max-width:100%;height:100%;background:#fff;box-shadow:-4px 0 20px rgba(0,0,0,.2);transition:.3s;overflow:auto;padding:20px;z-index:2000}
.cart.open{right:0}
.item{display:flex;gap:10px;border-bottom:1px solid #ddd;padding:10px 0}
.item img{width:60px;height:60px;object-fit:cover}
.remove{background:red;color:#fff;border:none;padding:5px 8px}
input,textarea{width:100%;padding:10px;margin:6px 0}
.submit{background:#2563eb;color:#fff;border:none;padding:12px;width:100%}
.success{display:none;background:#16a34a;color:#fff;padding:10px;margin:10px 0;border-radius:6px}
.wa{position:fixed;right:20px;bottom:20px;background:#25D366;color:#fff;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:30px}
@media(max-width:600px){.hero h1{font-size:30px}}
</style>
</head>
<body>
<header>
<div class="logo"><h2>Ziyoraco</h2><small>Quality Products, Best Prices</small></div>
<div class="cart-btn" onclick="toggleCart()">🛒<span class="badge" id="count">0</span></div>
</header>

<section class="hero">
<div class="overlay">
<h1>Welcome to Ziyoraco</h1>
<p>Your Trusted Online Store</p>
<a href="#products" class="btn">Shop Now</a>
</div>
</section>

<section id="products" class="products">
<h2 style="text-align:center;margin-bottom:20px">Products</h2>
<div class="grid" id="grid"></div>
</section>

<div class="cart" id="cart">
<h2>Shopping Cart</h2>
<button onclick="toggleCart()">Close</button>
<div id="cartItems"></div>
<h3>Total ₹<span id="total">0</span></h3>

<div class="success" id="success">Order Placed Successfully! We will contact you on WhatsApp within 1 hour</div>

<form id="orderForm" action="https://formspree.io/f/xdkogvqr" method="POST">
<input type="hidden" name="order" id="orderData">
<input required name="Full Name" placeholder="Full Name">
<input required name="Phone" placeholder="Phone">
<textarea required name="Address" placeholder="Full Address"></textarea>
<input required name="City" placeholder="City">
<input required name="Pincode" placeholder="Pincode">
<button class="submit">Place Order</button>
</form>
</div>

<a class="wa" href="https://wa.me/917032098002" target="_blank">💬</a>

<script>
const products=[
{name:"Wireless Headphones",price:1499,img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400"},
{name:"Smart Watch",price:2999,img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400"},
{name:"Bluetooth Speaker",price:1999,img:"https://images.unsplash.com/photo-1608043152269-423dbba4e7e1?w=400"},
{name:"Power Bank 20000mAh",price:899,img:"https://images.unsplash.com/photo-1609091636929-d2c5c31d7988?w=400"}
];
let cart=[];
const grid=document.getElementById('grid');
products.forEach((p,i)=>{
grid.innerHTML+=`<div class="card"><img src="${p.img}"><div class="info"><h3>${p.name}</h3><div class="price">₹${p.price}</div><div class="qty"><button onclick="chg(${i},-1)">-</button><span id="q${i}">1</span><button onclick="chg(${i},1)">+</button></div><button class="add" onclick="add(${i})">Add to Cart</button></div></div>`
});
const qtys=[1,1,1,1];
function chg(i,v){qtys[i]=Math.max(1,qtys[i]+v);document.getElementById('q'+i).innerText=qtys[i]}
function add(i){cart.push({...products[i],qty:qtys[i]});render()}
function render(){
let c=0,t=0,html='';
cart.forEach((x,idx)=>{
c+=x.qty;t+=x.qty*x.price;
html+=`<div class=item><img src="${x.img}"><div><b>${x.name}</b><br>Qty:${x.qty}<br>₹${x.price}</div><button class=remove onclick="rem(${idx})">X</button></div>`
});
document.getElementById('cartItems').innerHTML=html;
document.getElementById('count').innerText=c;
document.getElementById('total').innerText=t;
document.getElementById('orderData').value=JSON.stringify(cart);
}
function rem(i){cart.splice(i,1);render()}
function toggleCart(){document.getElementById('cart').classList.toggle('open')}

document.getElementById('orderForm').addEventListener('submit',async function(e){
e.preventDefault();
const form=this;
const res=await fetch(form.action,{method:'POST',body:new FormData(form),headers:{Accept:'application/json'}});
if(res.ok){
document.getElementById('success').style.display='block';
form.reset();
cart=[];render();
}
});
</script>
</body>
</html>
